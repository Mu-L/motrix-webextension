name: Build and test
on:
  push:
  pull_request:

jobs:
  # ── 1. Build both browser targets ──────────────────────────────────────────
  build:
    if: "!startsWith(github.ref, 'refs/tags')"
    name: Build extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - run: corepack enable

      - run: yarn install

      - name: Build Chrome
        run: yarn run build chrome

      - name: Build Firefox
        run: yarn run build firefox

      - name: Upload Chrome build
        uses: actions/upload-artifact@v7
        with:
          name: dist-chrome
          path: dist/chrome/
          retention-days: 1

      - name: Upload Firefox build
        uses: actions/upload-artifact@v7
        with:
          name: dist-firefox
          path: dist/firefox/
          retention-days: 1

  # ── 2. E2E tests — Chrome ──────────────────────────────────────────────────
  e2e-chrome:
    if: "!startsWith(github.ref, 'refs/tags')"
    name: E2E Tests (Chrome)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - run: corepack enable

      - name: Install dependencies
        run: yarn install

      # Install Playwright's "Chrome for Testing" binary (chromium channel).
      # Unlike system Chrome stable, Chrome for Testing allows unpacked
      # extensions to register service workers via --load-extension.
      # --with-deps also installs all required Linux system libraries.
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Download Chrome extension build
        uses: actions/download-artifact@v8
        with:
          name: dist-chrome
          path: dist/chrome/

      - name: Run E2E tests (Chrome, headless)
        run: yarn test

      - name: Test Summary (Chrome)
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results/junit.xml

  # ── 3. E2E tests — Firefox ─────────────────────────────────────────────────
  e2e-firefox:
    if: "!startsWith(github.ref, 'refs/tags')"
    name: E2E Tests (Firefox)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'yarn'

      - run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Install Playwright Firefox
        run: npx playwright install --with-deps firefox

      - name: Download Firefox extension build
        uses: actions/download-artifact@v8
        with:
          name: dist-firefox
          path: dist/firefox/

      - name: Run E2E tests (Firefox, headless)
        run: yarn test:firefox

      - name: Test Summary (Firefox)
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results/junit.xml
